name: CI

on:
  push:
    branches: [main, consolidated-import]
  pull_request:

jobs:
  backend:
    name: Backend (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: consolidated/backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt
      - name: Unit tests (real AUKF/LQR/C-UAS/geofence/RRT* in the loop)
        run: python test_backend.py

  frontend:
    name: Frontend (typecheck + test + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: consolidated/gcs-web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: consolidated/gcs-web/package-lock.json
      - run: npm ci
      - name: Typecheck (tsc --noEmit, strict unused checks)
        run: npm run typecheck
      - name: Unit tests (vitest)
        run: npm run test
      - name: Build (tsc + vite)
        run: npm run build

  e2e-smoke:
    name: End-to-end smoke (best-effort; needs live weather API)
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    # Third-party network (Open-Meteo) can be flaky in CI; run it but don't block merges.
    continue-on-error: true
    defaults:
      run:
        working-directory: consolidated/backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt
      - name: Boot the unified server and drive one full mission
        run: |
          SKYCORE_DB=":memory:" python serve.py &
          SERVER_PID=$!
          for i in $(seq 1 30); do curl -sf http://localhost:8080/api/healthz >/dev/null && break; sleep 1; done
          sleep 8   # let the async Open-Meteo fetch populate the weather cache
          python smoke_test.py
          kill $SERVER_PID || true
